services:
  # FastAPI 应用服务
  # 注意：此配置连接到已存在的外部容器 postgres-18 和 my-redis
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app_backend:latest  # 自定义镜像名称和标签
    container_name: app_backend
    restart: unless-stopped
    # 从 .env 文件批量加载环境变量（新增变量无需再改此文件）
    env_file:
      - .env
    environment:
      # 仅保留需要在 compose 中固定/覆盖的项（容器内主机名等）
      DATABASE_HOST: postgres-18
      DATABASE_PORT: 5432
      REDIS_HOST: my-redis
      REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # 持久化日志
      - ./log:/app/log
    # 使用默认 bridge 网络以连接到外部容器
    network_mode: bridge
    # 添加外部容器的链接
    external_links:
      - postgres-18
      - my-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
